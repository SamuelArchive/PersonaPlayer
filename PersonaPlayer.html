<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona 5 Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E62020;--dark:#0a0a0a;--card:#111;--white:#f5f5f0;--gold:#FFD700;--gray:#888}
body{background:var(--dark);font-family:'Rajdhani',sans-serif;color:var(--white);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;transition:background .3s}
.bg{position:fixed;inset:0;z-index:0;background-image:repeating-linear-gradient(45deg,transparent 0,transparent 18px,rgba(230,32,32,.06) 18px,rgba(230,32,32,.06) 19px),repeating-linear-gradient(-45deg,transparent 0,transparent 18px,rgba(230,32,32,.06) 18px,rgba(230,32,32,.06) 19px);pointer-events:none}
.corner{position:fixed;z-index:1;width:60px;height:60px;border-color:var(--red);border-style:solid;opacity:.5;pointer-events:none}
.corner.tl{top:12px;left:12px;border-width:3px 0 0 3px}
.corner.tr{top:12px;right:12px;border-width:3px 3px 0 0}
.corner.bl{bottom:12px;left:12px;border-width:0 0 3px 3px}
.corner.br{bottom:12px;right:12px;border-width:0 3px 3px 0}

.wrapper{position:relative;z-index:2;width:100%;max-width:900px;display:flex;gap:28px;align-items:flex-start}

/* EDITOR */
.editor{flex:0 0 320px;display:flex;flex-direction:column;gap:14px;transition:opacity .3s,transform .3s}
.editor.hidden{display:none}
.panel{background:#111;border:1px solid #2a2a2a;padding:16px;display:flex;flex-direction:column;gap:10px}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--red);border-bottom:1px solid #1e1e1e;padding-bottom:8px;margin-bottom:4px}
label{font-size:11px;letter-spacing:1px;color:var(--gray);text-transform:uppercase;display:block;margin-bottom:3px}
input[type=text],input[type=color]{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:var(--white);font-family:'Rajdhani',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--red)}
input[type=color]{height:32px;padding:2px 4px;cursor:pointer}
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.track-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;padding-right:4px}
.track-list::-webkit-scrollbar{width:3px}
.track-list::-webkit-scrollbar-thumb{background:var(--red)}
.track-item{background:#0d0d0d;border:1px solid #1e1e1e;padding:10px;display:flex;flex-direction:column;gap:6px;position:relative}
.track-item.dragging{opacity:.4;border-color:var(--red)}
.track-item.drag-over{border-color:var(--gold)}
.track-num{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--red);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.track-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.file-btn{background:none;border:1px solid #2a2a2a;color:var(--gray);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;padding:6px 8px;cursor:pointer;width:100%;text-align:left;transition:all .2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-btn:hover{border-color:var(--red);color:var(--white)}
.file-btn.loaded{border-color:#1e6e1e;color:#4caf50}
.remove-btn{background:none;border:none;color:#444;cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color .15s}
.remove-btn:hover{color:var(--red)}
.add-btn{background:none;border:1px dashed #2a2a2a;color:var(--gray);font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;padding:8px;cursor:pointer;width:100%;transition:all .2s}
.add-btn:hover{border-color:var(--red);color:var(--red)}
.add-btn:disabled{opacity:.3;cursor:not-allowed}
.drag-hint{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;text-align:center}
.btn-row{display:flex;gap:8px}
.save-btn{background:var(--red);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;padding:10px;cursor:pointer;flex:1;transition:background .2s,transform .1s}
.save-btn:hover{background:#ff3333}
.save-btn:active{transform:scale(.98)}
.apply-btn{background:none;border:1px solid #2a2a2a;color:var(--gray);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:10px 14px;cursor:pointer;transition:all .2s}
.apply-btn:hover{border-color:var(--red);color:var(--white)}

/* PLAYER */
.player-wrap{flex:1;min-width:0;position:relative}
.edit-toggle{position:absolute;top:14px;right:14px;z-index:10;background:none;border:1px solid #2a2a2a;color:var(--gray);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all .2s;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.edit-toggle:hover{border-color:var(--red);color:var(--red)}
.edit-toggle svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--card);border:2px solid var(--red);clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));padding:48px 24px 24px;display:flex;flex-direction:column;gap:20px;position:relative}
.top-label{position:absolute;top:10px;left:24px;background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;padding:4px 16px 3px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 100%,0 100%);white-space:nowrap;transition:background .3s}
.main{display:flex;gap:18px;align-items:flex-start}
.avatar-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px}
.avatar-frame{width:110px;height:110px;border:3px solid var(--red);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));overflow:hidden;cursor:pointer;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:border-color .2s}
.avatar-frame:hover{border-color:var(--gold)}
.avatar-frame img{width:100%;height:100%;object-fit:cover;display:none}
.av-ph{text-align:center;pointer-events:none}
.av-ph svg{display:block;margin:0 auto 6px;opacity:.6}
.av-ph span{font-size:10px;color:var(--gray);letter-spacing:1px;text-transform:uppercase}
.badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;padding:2px 10px;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);transition:background .3s}
.info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.tag{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--red)}
.track-title-el{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.15;word-break:break-word}
.track-artist-el{font-size:13px;color:#aaa;letter-spacing:1px}
.stats-row{display:flex;gap:12px;margin-top:6px}
.stat{display:flex;flex-direction:column;gap:1px}
.slabel{font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase}
.sval{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px}
.divider{height:1px;background:linear-gradient(90deg,var(--red),transparent)}
.prog-section{display:flex;flex-direction:column;gap:6px}
.time-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gray)}
.prog-track{width:100%;height:4px;background:#2a2a2a;position:relative;cursor:pointer;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.prog-fill{height:100%;background:var(--red);width:0%;position:relative;transition:background .3s}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:12px;height:12px;background:var(--red);transform:rotate(45deg);transition:background .3s}
.controls{display:flex;align-items:center;justify-content:center;gap:12px}
.cbtn{background:none;border:none;cursor:pointer;color:var(--gray);display:flex;align-items:center;justify-content:center;transition:color .15s,transform .1s;padding:4px}
.cbtn:hover{color:var(--red);transform:scale(1.15)}
.cbtn.active{color:var(--red)}
.cbtn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.playbtn{background:var(--red);border:none;cursor:pointer;width:52px;height:52px;clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
.playbtn:hover{background:#ff3333;transform:scale(1.05)}
.playbtn svg{width:24px;height:24px;fill:currentColor}
.vol-row{display:flex;align-items:center;gap:10px}
.vol-row svg{width:18px;height:18px;fill:none;stroke:var(--gray);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
input[type=range]{flex:1;accent-color:var(--red);cursor:pointer;height:3px}
.pl-header{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--red);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pl-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--red),transparent)}
.playlist{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto}
.playlist::-webkit-scrollbar{width:3px}
.playlist::-webkit-scrollbar-thumb{background:var(--red)}
.pli{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)}
.pli:hover{background:#1a1a1a;border-left-color:var(--red)}
.pli.active{background:rgba(230,32,32,.12);border-left-color:var(--red)}
.pli .num{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#555;min-width:18px;flex-shrink:0}
.pli.active .num{color:var(--red)}
.pli .ptitle{flex:1;font-size:13px;color:#ccc;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pli.active .ptitle{color:var(--white);font-weight:600}
.pli .partist{font-size:11px;color:#555;flex-shrink:0;margin-left:6px}
.pli .no-audio{font-size:10px;color:var(--red);opacity:.5;margin-left:4px;flex-shrink:0}
.dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;animation:blink 1.2s infinite;margin-right:2px;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;border:1px solid var(--red);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px;padding:10px 20px;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){.wrapper{flex-direction:column}.editor{flex:none;width:100%}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="toast" id="toast"></div>

<div class="wrapper">

  <div class="editor" id="editor">
    <div class="panel">
      <div class="panel-title">Identity</div>
      <div>
        <label>Player title (top bar)</label>
        <input type="text" id="cfgTitle" value="PHANTOM THIEVES MUSIC" maxlength="30">
      </div>
      <div>
        <label>Codename (below photo)</label>
        <input type="text" id="cfgCodename" value="NIHIL" maxlength="16">
      </div>
      <div class="color-row">
        <div><label>Accent color</label><input type="color" id="cfgColor" value="#E62020"></div>
        <div><label>Background</label><input type="color" id="cfgBg" value="#0a0a0a"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Stats</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label>Label 1</label><input type="text" id="s1l" value="POWER" maxlength="8"><input type="text" id="s1v" value="99" maxlength="4" style="margin-top:4px"></div>
        <div><label>Label 2</label><input type="text" id="s2l" value="CHARM" maxlength="8"><input type="text" id="s2v" value="87" maxlength="4" style="margin-top:4px"></div>
        <div><label>Label 3</label><input type="text" id="s3l" value="GUTS" maxlength="8"><input type="text" id="s3v" value="93" maxlength="4" style="margin-top:4px"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Tracks <span id="trackCount" style="color:#555;font-size:11px">(0/10)</span></div>
      <div class="drag-hint">drag to reorder</div>
      <div class="track-list" id="trackList"></div>
      <button class="add-btn" id="addTrackBtn" onclick="addTrack()">+ ADD TRACK</button>
    </div>

    <div class="btn-row">
      <button class="apply-btn" onclick="applyConfig()">PREVIEW</button>
      <button class="save-btn" onclick="saveAndClose()">♠ SAVE &amp; CLOSE</button>
    </div>
  </div>

  <div class="player-wrap">
    <button class="edit-toggle" id="editToggle" onclick="toggleEditor()" title="Open editor">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="card" id="playerCard">
      <div class="top-label" id="playerTitle">♠ PHANTOM THIEVES MUSIC</div>
      <div class="main">
        <div class="avatar-wrap">
          <div class="avatar-frame" id="avFrame" onclick="document.getElementById('avInput').click()">
            <img id="avImg" src="" alt="avatar">
            <div class="av-ph" id="avPh">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#E62020" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              <span>Your photo</span>
            </div>
          </div>
          <input type="file" id="avInput" accept="image/*" style="display:none">
          <div class="badge" id="playerBadge">NIHIL</div>
        </div>
        <div class="info">
          <div class="tag">▶ NOW PLAYING</div>
          <div class="track-title-el" id="trackTitleEl">—</div>
          <div class="track-artist-el" id="trackArtistEl">—</div>
          <div class="stats-row">
            <div class="stat"><span class="slabel" id="sl1">POWER</span><span class="sval" id="sv1">99</span></div>
            <div class="stat"><span class="slabel" id="sl2">CHARM</span><span class="sval" id="sv2">87</span></div>
            <div class="stat"><span class="slabel" id="sl3">GUTS</span><span class="sval" id="sv3">93</span></div>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="prog-section">
        <div class="time-row"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
        <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
      </div>
      <div class="controls">
        <button class="cbtn" onclick="prevTrack()" title="Previous"><svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg></button>
        <button class="cbtn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle"><svg viewBox="0 0 24 24"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg></button>
        <button class="playbtn" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
        <button class="cbtn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat"><svg viewBox="0 0 24 24"><polyline points="17,1 21,5 17,9"/><path d="M3,11V9a4,4,0,0,1,4-4H21"/><polyline points="7,23 3,19 7,15"/><path d="M21,13v2a4,4,0,0,1-4,4H3"/></svg></button>
        <button class="cbtn" onclick="nextTrack()" title="Next"><svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg></button>
      </div>
      <div class="vol-row">
        <svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/></svg>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
        <svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/></svg>
      </div>
      <div>
        <div class="pl-header">SETLIST</div>
        <div class="playlist" id="playlist"></div>
      </div>
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
let tracks = [];
let current = 0, playing = false, shuffle = false, repeat = false;
let dragSrc = null;
const audio = document.getElementById('audioEl');
const MAX_TRACKS = 10;
const STORAGE_KEY = 'p5player_config';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleEditor() {
  const ed = document.getElementById('editor');
  ed.classList.toggle('hidden');
}

function saveAndClose() {
  applyConfig();
  const cfg = {
    title: document.getElementById('cfgTitle').value,
    codename: document.getElementById('cfgCodename').value,
    color: document.getElementById('cfgColor').value,
    bg: document.getElementById('cfgBg').value,
    s1l: document.getElementById('s1l').value,
    s1v: document.getElementById('s1v').value,
    s2l: document.getElementById('s2l').value,
    s2v: document.getElementById('s2v').value,
    s3l: document.getElementById('s3l').value,
    s3v: document.getElementById('s3v').value,
    tracks: tracks.map(t => ({ title: t.title, artist: t.artist, b64: t.b64, filename: t.filename })),
    avatar: document.getElementById('avImg').src || null,
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    showToast('♠ Saved!');
  } catch(e) {
    showToast('Audio files too large for storage — try smaller files');
    console.warn('localStorage quota exceeded', e);
  }
  document.getElementById('editor').classList.add('hidden');
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const cfg = JSON.parse(raw);
    document.getElementById('cfgTitle').value = cfg.title || '';
    document.getElementById('cfgCodename').value = cfg.codename || '';
    document.getElementById('cfgColor').value = cfg.color || '#E62020';
    document.getElementById('cfgBg').value = cfg.bg || '#0a0a0a';
    document.getElementById('s1l').value = cfg.s1l || '';
    document.getElementById('s1v').value = cfg.s1v || '';
    document.getElementById('s2l').value = cfg.s2l || '';
    document.getElementById('s2v').value = cfg.s2v || '';
    document.getElementById('s3l').value = cfg.s3l || '';
    document.getElementById('s3v').value = cfg.s3v || '';
    tracks = (cfg.tracks || []).map(t => ({ title: t.title||'', artist: t.artist||'', b64: t.b64||null, filename: t.filename||'' }));
    if (cfg.avatar && cfg.avatar.startsWith('data:')) {
      const img = document.getElementById('avImg');
      img.src = cfg.avatar; img.style.display = 'block';
      document.getElementById('avPh').style.display = 'none';
    }
    applyConfig();
    document.getElementById('editor').classList.add('hidden');
    return true;
  } catch(e) { return false; }
}

function addTrack() {
  if (tracks.length >= MAX_TRACKS) return;
  tracks.push({ title: '', artist: '', b64: null, filename: '' });
  renderEditor();
}

function removeTrack(i) {
  tracks.splice(i, 1);
  if (current >= tracks.length) current = Math.max(0, tracks.length - 1);
  renderEditor(); renderPlayer();
}

function renderEditor() {
  const list = document.getElementById('trackList');
  document.getElementById('trackCount').textContent = '(' + tracks.length + '/10)';
  document.getElementById('addTrackBtn').disabled = tracks.length >= MAX_TRACKS;
  list.innerHTML = tracks.map((t, i) => `
    <div class="track-item" draggable="true" data-i="${i}">
      <div class="track-num"><span>TRACK ${i+1}</span><button class="remove-btn" onclick="removeTrack(${i})">×</button></div>
      <div class="track-inputs">
        <input type="text" placeholder="Title" value="${escHtml(t.title)}" oninput="tracks[${i}].title=this.value">
        <input type="text" placeholder="Artist" value="${escHtml(t.artist)}" oninput="tracks[${i}].artist=this.value">
      </div>
      <button class="file-btn ${t.b64?'loaded':''}" onclick="pickAudio(${i})">${t.b64 ? '✓ '+escHtml(t.filename) : '+ Load audio file'}</button>
    </div>`).join('');

  list.querySelectorAll('.track-item').forEach(el => {
    el.addEventListener('dragstart', () => { dragSrc = parseInt(el.dataset.i); el.classList.add('dragging'); });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      const dest = parseInt(el.dataset.i);
      if (dragSrc === dest) return;
      const moved = tracks.splice(dragSrc, 1)[0];
      tracks.splice(dest, 0, moved);
      if (current === dragSrc) current = dest;
      else if (current > dragSrc && current <= dest) current--;
      else if (current < dragSrc && current >= dest) current++;
      renderEditor(); renderPlayer();
    });
  });
}

function pickAudio(i) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'audio/*';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      tracks[i].b64 = ev.target.result.split(',')[1];
      tracks[i].filename = file.name.length > 24 ? file.name.substring(0,22)+'…' : file.name;
      renderEditor();
      showToast('Track ' + (i+1) + ' loaded!');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function applyConfig() {
  const color = document.getElementById('cfgColor').value;
  const bg = document.getElementById('cfgBg').value;
  document.documentElement.style.setProperty('--red', color);
  document.documentElement.style.setProperty('--dark', bg);
  document.body.style.background = bg;
  document.getElementById('playerTitle').textContent = '♠ ' + (document.getElementById('cfgTitle').value || 'MUSIC PLAYER');
  document.getElementById('playerBadge').textContent = document.getElementById('cfgCodename').value || 'PLAYER';
  document.getElementById('sl1').textContent = document.getElementById('s1l').value || 'STAT';
  document.getElementById('sv1').textContent = document.getElementById('s1v').value || '—';
  document.getElementById('sl2').textContent = document.getElementById('s2l').value || 'STAT';
  document.getElementById('sv2').textContent = document.getElementById('s2v').value || '—';
  document.getElementById('sl3').textContent = document.getElementById('s3l').value || 'STAT';
  document.getElementById('sv3').textContent = document.getElementById('s3v').value || '—';
  renderPlayer();
  if (tracks.length > 0 && !audio.src) loadTrack(0);
}

function loadTrack(i) {
  if (tracks.length === 0) return;
  const t = tracks[i];
  document.getElementById('trackTitleEl').textContent = t.title || '—';
  document.getElementById('trackArtistEl').textContent = t.artist || '—';
  document.getElementById('curTime').textContent = '0:00';
  document.getElementById('totTime').textContent = '0:00';
  document.getElementById('progFill').style.width = '0%';
  if (t.b64) { audio.src = 'data:audio/mpeg;base64,' + t.b64; audio.load(); }
  else audio.src = '';
  renderPlaylist();
}

function togglePlay() {
  if (!tracks.length || !tracks[current].b64) { showToast('No audio loaded for this track'); return; }
  playing ? audio.pause() : audio.play();
}

function updatePlayIcon() {
  document.getElementById('playIcon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function nextTrack() {
  if (!tracks.length) return;
  current = shuffle ? Math.floor(Math.random()*tracks.length) : (current+1)%tracks.length;
  playing = false; loadTrack(current);
  if (tracks[current].b64) audio.play();
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  current = (current-1+tracks.length)%tracks.length;
  playing = false; loadTrack(current);
  if (tracks[current].b64) audio.play();
}

function selectTrack(i) {
  current = i; playing = false; loadTrack(i);
  if (tracks[i].b64) audio.play();
}

function toggleShuffle() { shuffle=!shuffle; document.getElementById('shuffleBtn').classList.toggle('active',shuffle); }
function toggleRepeat() { repeat=!repeat; audio.loop=repeat; document.getElementById('repeatBtn').classList.toggle('active',repeat); }

audio.addEventListener('play', () => { playing=true; updatePlayIcon(); renderPlaylist(); });
audio.addEventListener('pause', () => { playing=false; updatePlayIcon(); renderPlaylist(); });
audio.addEventListener('ended', () => { if(!repeat) nextTrack(); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progFill').style.width = (audio.currentTime/audio.duration*100)+'%';
  document.getElementById('curTime').textContent = fmt(audio.currentTime);
  document.getElementById('totTime').textContent = fmt(audio.duration);
});
document.getElementById('progTrack').addEventListener('click', function(e) {
  if (!audio.duration) return;
  audio.currentTime = ((e.clientX-this.getBoundingClientRect().left)/this.offsetWidth)*audio.duration;
});
document.getElementById('volSlider').addEventListener('input', function() { audio.volume=this.value; });
document.getElementById('avInput').addEventListener('change', function(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=document.getElementById('avImg');
    img.src=ev.target.result; img.style.display='block';
    document.getElementById('avPh').style.display='none';
  };
  r.readAsDataURL(file);
});

function fmt(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderPlayer() {
  if (tracks.length === 0) {
    document.getElementById('trackTitleEl').textContent = '—';
    document.getElementById('trackArtistEl').textContent = 'Add tracks in the editor';
  }
  renderPlaylist();
}

function renderPlaylist() {
  document.getElementById('playlist').innerHTML = tracks.map((t,i) => {
    const a = i===current;
    return '<div class="pli'+(a?' active':'')+'" onclick="selectTrack('+i+')">'
      +(a&&playing?'<span class="dot"></span>':'')
      +'<span class="num">'+(a?'♠':(i+1))+'</span>'
      +'<span class="ptitle">'+(escHtml(t.title)||'Untitled')+'</span>'
      +'<span class="partist">'+escHtml(t.artist)+'</span>'
      +(!t.b64?'<span class="no-audio">no audio</span>':'')
      +'</div>';
  }).join('');
}

const hasSaved = loadSaved();
if (!hasSaved) { renderEditor(); renderPlayer(); }
else { renderEditor(); }
</script>
</body>
</html>
